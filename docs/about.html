<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About</title>
    <link rel="icon" href="./favicon.svg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body data-page="about">
    <header id="app-nav" class="border-b border-slate-700/40"></header>

    <main class="mx-auto max-w-6xl px-4 sm:px-6 py-10 space-y-10">
      <section class="grid gap-6 lg:grid-cols-[minmax(0,2fr)_minmax(0,1fr)]">
        <div class="app-card rounded-2xl p-8">
          <h1 id="about-headline" class="text-xl sm:text-2xl font-semibold tracking-tight text-slate-50"></h1>
          <p id="about-summary" class="mt-2 text-sm app-muted"></p>
          <div id="about-paras" class="mt-6 space-y-4"></div>
        </div>

        <div class="app-card rounded-2xl p-8">
          <div class="flex items-start justify-between gap-4">
            <div>
              <div class="text-xs font-semibold uppercase tracking-wide app-muted">Profile</div>
              <div class="mt-2 text-sm font-semibold text-slate-50">Contact</div>
            </div>
            <img id="about-avatar" class="h-20 w-20 rounded-2xl object-cover ring-1 ring-slate-700/50" loading="lazy" alt="" />
          </div>
          <div class="mt-4 text-sm text-slate-200">
            <div>See contact details on the Contact page.</div>
          </div>
          <div class="mt-4">
            <a class="btn btn-sm btn-outline-light" href="contact.html">Go to Contact</a>
          </div>
        </div>
      </section>

      <section>
        <div class="text-sm font-semibold text-slate-50">Skills</div>
        <div class="mt-4 grid gap-4 lg:grid-cols-2" id="about-skills"></div>
      </section>

      <section>
        <div class="text-sm font-semibold text-slate-50">Timeline</div>
        <div class="mt-4 grid gap-4" id="about-timeline"></div>
      </section>
    </main>

    <footer id="app-footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
