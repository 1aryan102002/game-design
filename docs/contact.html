<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="icon" href="./favicon.svg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body data-page="contact">
    <header id="app-nav" class="border-b border-slate-700/40"></header>

    <main class="mx-auto max-w-6xl px-4 sm:px-6 py-10 space-y-8">
      <div class="app-card rounded-2xl p-8">
        <div class="text-sm font-semibold text-slate-50">Contact</div>
        <div class="mt-2 text-sm app-muted">Reach out for QA testing and level design opportunities.</div>
      </div>

      <div class="grid gap-6 lg:grid-cols-2">
        <section class="app-card rounded-2xl p-6">
          <div class="text-sm font-semibold text-slate-50">Contact methods</div>

          <div class="mt-4 grid gap-3">
            <div class="rounded-2xl border border-slate-700/40 bg-slate-950/20 p-4 flex flex-wrap items-center justify-between gap-3">
              <div>
                <div class="text-sm text-slate-200" id="contact-email"></div>
                <div class="text-xs app-muted">Primary email</div>
              </div>
              <button id="btn-copy-email" class="btn btn-sm btn-outline-light" type="button">Copy</button>
            </div>

            <div class="rounded-2xl border border-slate-700/40 bg-slate-950/20 p-4 flex flex-wrap items-center justify-between gap-3">
              <div>
                <div class="text-sm text-slate-200" id="contact-email2"></div>
                <div class="text-xs app-muted">Alternate email</div>
              </div>
              <button id="btn-copy-email2" class="btn btn-sm btn-outline-light" type="button">Copy</button>
            </div>

            <div class="rounded-2xl border border-slate-700/40 bg-slate-950/20 p-4 flex flex-wrap items-center justify-between gap-3">
              <div>
                <div class="text-sm text-slate-200" id="contact-phone"></div>
                <div class="text-xs app-muted">Phone</div>
              </div>
              <button id="btn-copy-phone" class="btn btn-sm btn-outline-light" type="button">Copy</button>
            </div>
          </div>

          <div class="mt-6 flex flex-wrap gap-2">
            <a id="contact-linkedin" target="_blank" rel="noreferrer" class="btn btn-sm btn-outline-light"><span id="contact-linkedin-text">LinkedIn</span></a>
            <a id="contact-github" target="_blank" rel="noreferrer" class="btn btn-sm btn-outline-light"><span id="contact-github-text">GitHub</span></a>
            <a id="contact-docs" target="_blank" rel="noreferrer" class="btn btn-sm btn-outline-light"><span id="contact-docs-text">Project Docs</span></a>
          </div>

          <div id="copy-status" class="mt-3 text-xs app-muted" aria-live="polite"></div>
        </section>

        <section class="app-card rounded-2xl p-6">
          <div class="text-sm font-semibold text-slate-50">Send a message</div>
          <p class="mt-1 text-sm app-muted">Copy an email draft and paste it into any email app.</p>

          <div class="mt-4 grid gap-3">
            <label class="grid gap-1">
              <span class="text-xs font-medium app-muted">Your name</span>
              <input id="form-name" class="form-control bg-slate-950/20 text-slate-100 border-slate-700/50" placeholder="Recruiter / Studio" />
            </label>
            <label class="grid gap-1">
              <span class="text-xs font-medium app-muted">Your email</span>
              <input id="form-email" class="form-control bg-slate-950/20 text-slate-100 border-slate-700/50" placeholder="you@company.com" />
            </label>
            <label class="grid gap-1">
              <span class="text-xs font-medium app-muted">Message</span>
              <textarea id="form-message" rows="6" class="form-control bg-slate-950/20 text-slate-100 border-slate-700/50" placeholder="Tell Aryan what you’re hiring for and what you’d like to see."></textarea>
            </label>
          </div>

          <div class="mt-4 flex flex-wrap gap-3">
            <button id="btn-copy-draft" class="btn btn-sm" style="background:var(--accent);color:#001019" type="button">Copy Email Draft</button>
            <button id="btn-open-mail" class="btn btn-sm btn-outline-light" type="button">Open Email App</button>
          </div>
        </section>
      </div>
    </main>

    <footer id="app-footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
