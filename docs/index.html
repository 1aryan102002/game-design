<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="icon" href="./favicon.svg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body data-page="home">
    <header id="app-nav" class="border-b border-slate-700/40"></header>

    <main class="mx-auto max-w-6xl px-4 sm:px-6 py-10 space-y-10">
      <div id="app-error" class="hidden app-card rounded-2xl p-6">
        <div class="text-sm font-semibold text-slate-50">Content failed to load</div>
        <div class="mt-2 text-sm app-muted">Make sure this site is served from GitHub Pages (not opened as a local file).</div>
      </div>

      <section class="grid gap-6 lg:grid-cols-[minmax(0,1.2fr)_minmax(0,0.8fr)]">
        <div class="app-card rounded-2xl p-8">
          <div class="flex flex-col gap-6 sm:flex-row sm:items-start sm:justify-between sm:gap-8">
            <div class="min-w-0">
              <div id="home-roles" class="flex flex-wrap gap-2"></div>
              <h1 id="home-name" class="mt-4 text-2xl sm:text-3xl font-semibold tracking-tight text-slate-50"></h1>
              <p id="home-summary" class="mt-2 text-sm sm:text-base app-muted"></p>

              <div class="mt-6 flex flex-wrap gap-3">
                <a class="btn btn-sm" style="background:var(--accent);color:#001019" href="projects.html">View Projects</a>
                <a class="btn btn-sm btn-outline-light" href="contact.html">Contact</a>
                <a class="btn btn-sm btn-link text-cyan-200" href="about.html">About</a>
              </div>
            </div>

            <img
              id="home-avatar"
              class="h-28 w-28 shrink-0 rounded-2xl object-cover ring-1 ring-slate-700/50"
              loading="lazy"
              alt=""
            />
          </div>
        </div>

        <div id="home-highlights" class="grid gap-4"></div>
      </section>

      <section>
        <div class="flex items-end justify-between gap-4">
          <div>
            <div class="text-sm font-semibold text-slate-50">Featured work</div>
            <div class="mt-1 text-sm app-muted">A few projects that represent level flow, mechanics, and iteration.</div>
          </div>
          <a class="text-sm text-cyan-200" href="projects.html">All projects →</a>
        </div>
        <div id="home-featured" class="mt-4 grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
      </section>
    </main>

    <footer id="app-footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
