<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project</title>
    <link rel="icon" href="./favicon.svg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body data-page="project">
    <header id="app-nav" class="border-b border-slate-700/40"></header>

    <main class="mx-auto max-w-3xl px-4 sm:px-6 py-10 space-y-6">
      <div id="project-notfound" class="hidden app-card rounded-2xl p-8">
        <div class="text-sm font-semibold text-slate-50">Project not found</div>
        <div class="mt-2 text-sm app-muted">This project id doesn’t exist.</div>
        <div class="mt-5">
          <a class="btn btn-sm btn-outline-light" href="projects.html">Back to Projects</a>
        </div>
      </div>

      <div class="flex flex-wrap items-center justify-between gap-3">
        <a class="btn btn-sm btn-outline-light" href="projects.html">Back</a>
        <a id="project-source" class="text-sm text-cyan-200" target="_blank" rel="noreferrer"></a>
      </div>

      <section class="app-card rounded-2xl p-8">
        <div id="project-badges" class="flex flex-wrap gap-2"></div>
        <h1 id="project-title" class="mt-4 text-2xl font-semibold tracking-tight text-slate-50"></h1>
        <p id="project-summary" class="mt-2 text-sm app-muted"></p>

        <div class="mt-6 grid gap-6 sm:grid-cols-2">
          <div>
            <div class="text-xs font-semibold uppercase tracking-wide app-muted">Responsibilities</div>
            <ul id="project-responsibilities" class="mt-2 list-disc space-y-2 pl-5 text-sm text-slate-200"></ul>
          </div>
          <div>
            <div class="text-xs font-semibold uppercase tracking-wide app-muted">Outcomes</div>
            <ul id="project-outcomes" class="mt-2 list-disc space-y-2 pl-5 text-sm text-slate-200"></ul>
          </div>
        </div>

        <div class="mt-6">
          <div class="text-xs font-semibold uppercase tracking-wide app-muted">Tools</div>
          <div id="project-tools" class="mt-2 flex flex-wrap gap-2"></div>
        </div>
      </section>

      <section class="app-card rounded-2xl p-8">
        <div class="text-sm font-semibold text-slate-50">Detailed write-up</div>
        <div id="project-writeup" class="mt-4 space-y-4"></div>
      </section>
    </main>

    <footer id="app-footer"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
